<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Travel Guide - Route Planner (Leaflet)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Leaflet CSS (free, no key) -->
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    />
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-route"></i> Smart Travel Guide</h1>
            <div>
                <button id="darkToggle"><i class="fas fa-moon"></i></button>
                <button id="voiceAssistantBtn"><i class="fas fa-microphone"></i></button>
                <button id="clearHistory"><i class="fas fa-trash"></i></button>
            </div>
        </header>
        
        <!-- Voice Assistant -->
        <div id="voicePanel" class="voice-panel">
            <button id="closeVoice"><i class="fas fa-times"></i></button>
            <div id="voiceStatus">Say "plan route from Delhi to Lucknow"...</div>
        </div>

        <!-- ROUTE PLANNER SECTION -->
        <section class="route-section">
            <h2><i class="fas fa-directions"></i> Route Planner</h2>
            <div class="route-inputs">
                <div>
                    <label>🚩 Starting Point</label>
                    <input type="text" id="startPoint" placeholder="Delhi, India">
                </div>
                <div>
                    <label>🎯 Ending Point</label>
                    <input type="text" id="endPoint" placeholder="Lucknow, India">
                </div>
            </div>
            <button id="planRoute"><i class="fas fa-map"></i> Plan Route</button>
            <div id="routeResult"></div>
        </section>

        <section class="location-section">
            <h2><i class="fas fa-map-marker-alt"></i> Single Location</h2>
            <input type="text" id="addressInput" placeholder="Lucknow, India" value="Lucknow, India">
            <button id="searchLocation">🔍 Search</button>
            <div id="locationResult"></div>
        </section>

        <!-- Image Analysis – left as visual demo only -->
        <section class="upload-section">
            <h2><i class="fas fa-image"></i> Image Analysis</h2>
            <input type="file" id="imageInput" accept="image/*">
            <button id="analyzeImage">Analyze</button>
            <div id="imageResult"></div>
        </section>

        <section class="text-section">
            <h2><i class="fas fa-comment"></i> Text Input</h2>
            <textarea id="textInput" placeholder="Enter travel notes..."></textarea>
            <div class="quick-actions">
                <button id="translateBtn"><i class="fas fa-language"></i></button>
                <button id="summarizeBtn"><i class="fas fa-compress"></i></button>
                <button id="speakBtn"><i class="fas fa-volume-up"></i></button>
            </div>
            <div id="textResult"></div>
        </section>

        <section class="map-section">
            <h2><i class="fas fa-globe"></i> Map</h2>
            <div class="map-controls">
                <input type="number" id="radius" value="10" min="1" max="50">
                <button id="showNearby">Nearby</button>
                <button id="getWeather">Weather</button>
            </div>
            <div id="map" style="height: 400px;"></div>
            <div id="nearbyPlaces"></div>
            <div id="weatherInfo"></div>
        </section>

        <section class="history-section">
            <h2><i class="fas fa-history"></i> History</h2>
            <ul id="historyList"></ul>
        </section>
    </div>

    <!-- Leaflet JS -->
    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>
    <script src="script.js"></script>
</body>
</html>
